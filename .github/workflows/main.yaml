name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"

jobs:
  test:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            php: "8.3"
          - os: ubuntu-26.04
            php: "8.5"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Configure extension
        run: make ext/configure

      - name: Build extension
        run: make ext/all

      - name: Run phpt tests
        run: make ext/test

      - name: Run procedural examples
        run: make ext/examples

      - name: Run unit tests
        run: make test-unit

      - name: Run OO examples
        run: make test-examples

      - name: Run documentation examples
        run: make test-doc-examples

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-php${{ matrix.php }}-${{ matrix.os }}
          retention-days: 3
          path: |
            ext/tests/**/*.diff
            ext/tests/**/*.exp
            ext/tests/**/*.out
